<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackySack Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f4f0;
    color: #1a1a1a;
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .brand-eye {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 5px;
  }
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5rem);
    line-height: 0.9;
    letter-spacing: 1px;
    color: #1a1a1a;
  }
  .brand-name em { color: #d94040; font-style: normal; }

  .sync-wrap { text-align: right; }
  .sync-label { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .sync-time  { font-size: 13px; color: #555; display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
  .sync-dot   { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .sync-dot.loading { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
  .sync-dot.err     { background: #d94040; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* SUMMARY */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.75rem;
  }
  .scard {
    background: #fff;
    border: 1px solid #e8e7e2;
    border-radius: 12px;
    padding: .9rem 1.1rem;
  }
  .scard-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    line-height: 1;
    color: #1a1a1a;
  }
  .scard-lbl {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 4px;
  }

  /* TABLE */
  .table-wrap {
    background: #fff;
    border: 1px solid #e8e7e2;
    border-radius: 14px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  col.c-rank { width: 52px; }
  col.c-name { width: auto; }
  col.c-num  { width: 110px; }

  thead tr { border-bottom: 1px solid #eeede8; }
  th {
    padding: 12px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #bbb;
    font-weight: 500;
    text-align: right;
  }
  th:first-child, th:nth-child(2) { text-align: left; }

  tbody tr { border-bottom: 1px solid #f0efe9; transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf7; }

  td {
    padding: 13px 16px;
    font-size: 14px;
    text-align: right;
    color: #1a1a1a;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td:first-child, td:nth-child(2) { text-align: left; }

  .rank-num {
    font-size: 13px;
    font-weight: 500;
    color: #ccc;
    display: inline-block;
    width: 24px;
    text-align: center;
  }
  .rank-num.r1 { color: #c8a020; font-size: 15px; }
  .rank-num.r2 { color: #999; }
  .rank-num.r3 { color: #b07030; }

  .name-cell { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
    text-transform: uppercase;
  }
  .name-txt { font-weight: 500; color: #1a1a1a; }

  .wins-val  { font-weight: 500; color: #1a1a1a; }
  .elims-val { color: #d94040; }

  .no-data {
    padding: 4rem;
    text-align: center;
    color: #bbb;
    font-size: 14px;
  }

  footer {
    margin-top: 1.25rem;
    font-size: 11px;
    color: #ccc;
    text-align: right;
    letter-spacing: .5px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eye">All-time stats</div>
      <div class="brand-name">Hacky<em>Sack</em></div>
    </div>
    <div class="sync-wrap">
      <div class="sync-label">Last updated</div>
      <div class="sync-time">
        <span class="sync-dot loading" id="syncDot"></span>
        <span id="syncTime">Loading…</span>
      </div>
    </div>
  </header>

  <div class="summary">
    <div class="scard"><div class="scard-val" id="s-players">—</div><div class="scard-lbl">Players</div></div>
    <div class="scard"><div class="scard-val" id="s-wins">—</div><div class="scard-lbl">Total wins</div></div>
    <div class="scard"><div class="scard-val" id="s-elims">—</div><div class="scard-lbl">Total elims</div></div>
    <div class="scard"><div class="scard-val" id="s-leader">—</div><div class="scard-lbl">Leading</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup><col class="c-rank"><col class="c-name"><col class="c-num"><col class="c-num"></colgroup>
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Wins</th>
          <th>Eliminations</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" class="no-data">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <footer>Auto-refreshes every 60 seconds</footer>
</div>

<script>
  // ============================================================
  //  PASTE YOUR GOOGLE SHEETS CSV URL HERE
  // ============================================================
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfL0GeTO0Bdsf96gm7bX_bhIeVPK9T6V4WZ_Ya_dhsn-D8MKB4Pgjzt-2FpZRy1xjhB-BNUhiV_uLG/pub?gid=0&single=true&output=csv";

  const REFRESH_INTERVAL = 60000;
  // ============================================================

  const AVATAR_PALETTES = [
    ["#e8f0fe","#3b6de8"],["#fce8e8","#d94040"],["#e8f8f0","#2a9e5e"],
    ["#fef8e8","#c8840a"],["#f0e8fe","#7c3aed"],["#e8faf8","#0e8a7a"],
  ];

  function avatarStyle(name) {
    const i = (name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % AVATAR_PALETTES.length;
    const [bg, fg] = AVATAR_PALETTES[i];
    return `background:${bg};color:${fg}`;
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
    return lines.slice(1).map(line => {
      const vals = [];
      let cur = '', inQ = false;
      for (let ch of line) {
        if (ch === '"') { inQ = !inQ; continue; }
        if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; continue; }
        cur += ch;
      }
      vals.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');
      return {
        name:         obj['name'] || 'Unknown',
        wins:         parseInt(obj['wins']) || 0,
        eliminations: parseInt(obj['eliminations']) || 0,
      };
    }).filter(p => p.name && p.name !== 'Unknown');
  }

  function render(players) {
    const sorted = [...players].sort((a, b) => b.wins - a.wins);
    const tbody = document.getElementById('tbody');

    if (!sorted.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="no-data">No players found — make sure your sheet has columns: Name, Wins, Eliminations</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map((p, i) => {
      const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      return `<tr>
        <td><span class="rank-num ${rc}">${i + 1}</span></td>
        <td><div class="name-cell">
          <div class="avatar" style="${avatarStyle(p.name)}">${initials(p.name)}</div>
          <span class="name-txt">${p.name}</span>
        </div></td>
        <td><span class="wins-val">${p.wins}</span></td>
        <td><span class="elims-val">${p.eliminations}</span></td>
      </tr>`;
    }).join('');

    const totalWins  = sorted.reduce((s, p) => s + p.wins, 0);
    const totalElims = sorted.reduce((s, p) => s + p.eliminations, 0);
    document.getElementById('s-players').textContent = sorted.length;
    document.getElementById('s-wins').textContent    = totalWins;
    document.getElementById('s-elims').textContent   = totalElims;
    document.getElementById('s-leader').textContent  = sorted[0] ? sorted[0].name : '—';
  }

  function setDot(state) {
    document.getElementById('syncDot').className =
      'sync-dot' + (state === 'ok' ? '' : state === 'err' ? ' err' : ' loading');
  }

  async function loadData() {
    setDot('loading');
    try {
      const res = await fetch(SHEET_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const players = parseCSV(await res.text());
      if (!players.length) throw new Error('No rows — check column names');
      render(players);
      setDot('ok');
      document.getElementById('syncTime').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (e) {
      setDot('err');
      document.getElementById('syncTime').textContent = 'Error: ' + e.message;
    }
  }

  loadData();
  setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
